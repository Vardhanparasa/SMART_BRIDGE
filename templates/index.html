<!DOCTYPE html>
<html>
<head>
    <title>AI-Enabled Student Admission System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🎓 AI-Enabled Student Admission System</h1>

<form action="/predict" method="POST">

<label>Student Name</label>
<input type="text" name="student_name" required>

<label>Education Level</label>
<select name="education_level">
    <option>Diploma</option>
    <option>UG</option>
    <option>Graduate</option>
</select>

<label>Course Category</label>
<select name="course_category">
    <option>Technical</option>
    <option>Non Technical</option>
</select>

<label>Course Fee</label>
<input type="number" name="course_fee" required>

<label>Discount Percentage</label>
<input type="number" name="discount_percentage" required>

<label>Payment Status</label>
<select name="payment_status">
    <option>Pending</option>
    <option>Partial</option>
    <option>Paid</option>
</select>

<label>Marks (%)</label>
<input type="number" name="marks" required>

<label>Attendance (%)</label>
<input type="number" name="attendance_score" required>

<br><br>

<button type="submit">
Analyze Student
</button>

</form>

</div>

</body>
</html>
